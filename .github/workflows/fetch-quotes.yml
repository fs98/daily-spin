name: Fetch Daily Quotes

on:
  schedule:
    - cron: '0 6 * * *' # Every day at 6 AM UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  fetch-quotes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch quotes from ZenQuotes
        run: curl -sL "https://zenquotes.io/api/quotes/" -o public/quotes.json

      - name: Verify valid JSON
        run: python3 -c "import json; json.load(open('public/quotes.json'))"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/quotes.json
          git diff --staged --quiet || git commit -m "chore: update daily quotes" && git push
